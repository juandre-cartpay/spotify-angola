<!DOCTYPE html>
<html lang="pt-AO">

<head>
    <script>
        if (!sessionStorage.getItem('funnel_started')) {
            window.location.href = 'index.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desbloqueio de Saldo</title>



    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #fff;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            background-color: #1ed760;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
        }

        .header {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo img {
            height: 70px;
            width: auto;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #121212;
        }

        .superscript {
            font-size: 10px;
            vertical-align: super;
            color: #888;
        }

        .balance-box {
            border: 2px solid #1ed760;
            padding: 5px 15px;
            border-radius: 5px;
            text-align: center;
        }

        .balance-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #777;
        }

        .balance-value {
            font-size: 16px;
            font-weight: 700;
            color: #000;
        }

        .content {
            width: 100%;
            max-width: 600px;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1ed760;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .video-container {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-verify {
            background-color: #e60000;
            color: white;
            border: none;
            padding: 20px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(230, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        ASSISTA O VÍDEO ABAIXO PARA LIBERAR SEU DINHEIRO.
    </div>

    <div class="header">
        <div class="logo">
            <img src="dikala logo.png" alt="Dikala Sonora">
            <span class="logo-text">Dikala Sonora<span class="superscript">®</span></span>
        </div>
        <div class="balance-box">
            <div class="balance-label">Saldo</div>
            <div class="balance-value" id="displayBalance">0,00 Kz</div>
        </div>
    </div>

    <div class="content">
        <h1>DESBLOQUEIO DE SALDO</h1>
        <p>Clique no botão abaixo e verifique sua conta!</p>

        <div class="video-container" style="display: none;">
            <!-- Vturb Player (Hidden for recording) -->
            <vturb-smartplayer id="vid-6a0e9934d73d7a412579cea5"
                style="display: block; margin: 0 auto; width: 100%; "></vturb-smartplayer>
            <script
                type="text/javascript"> var s = document.createElement("script"); s.src = "https://scripts.converteai.net/5b6e7aa6-946a-4ac0-8394-9c924b02807e/players/6a0e9934d73d7a412579cea5/v4/player.js", s.async = !0, document.head.appendChild(s); </script>
        </div>

        <button class="btn-verify" onclick="alert('Aqui você colocará o link do checkout da taxa!')">VERIFICAR
            CONTA</button>
    </div>

    <script>
        // Load Balance
        const currentBalance = parseFloat(localStorage.getItem('spotifyAngolaBalance')) || 0;
        document.getElementById('displayBalance').innerText = currentBalance.toLocaleString('pt-AO') + ' Kz';
    </script>
</body>

</html>
